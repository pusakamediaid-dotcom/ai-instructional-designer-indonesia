<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g1)"/>

  <!-- Graduation cap (mortarboard) -->
  <g transform="translate(32 34)">
    <!-- Cap board -->
    <path d="M -20 -2 L 0 -12 L 20 -2 L 0 8 Z" fill="#FFFFFF"/>
    <!-- Cap body -->
    <path d="M -12 2 L -12 10 Q 0 16 12 10 L 12 2 L 0 8 Z" fill="#FFFFFF" opacity="0.92"/>
    <!-- Tassel string -->
    <path d="M 18 -3 L 18 8 L 22 12" stroke="#FBBF24" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Tassel bell -->
    <circle cx="22" cy="13" r="2" fill="url(#g2)"/>
  </g>

  <!-- AI spark (4-point star) top-left -->
  <g transform="translate(16 16)" fill="#FBBF24">
    <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z"/>
  </g>
  <!-- Small spark bottom-right -->
  <g transform="translate(50 50)" fill="#FFFFFF" opacity="0.85">
    <path d="M 0 -3 L 0.8 -0.8 L 3 0 L 0.8 0.8 L 0 3 L -0.8 0.8 L -3 0 L -0.8 -0.8 Z"/>
  </g>
</svg>
